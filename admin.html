<section id="content-editor">
    <h2>Content Editor</h2>
    <form>
        <label for="story-synopsis">Story Synopsis:</label>
        <textarea id="story-synopsis" name="story-synopsis"></textarea>

        <label for="social-media-links">Social Media Links:</label>
        <input type="text" id="social-media-links" name="social-media-links">

        <label for="chapter-descriptions">Chapter Descriptions:</label>
        <textarea id="chapter-descriptions" name="chapter-descriptions"></textarea>

        <label for="character-descriptions">Character Descriptions:</label>
        <textarea id="character-descriptions" name="character-descriptions"></textarea>
        
        <button type="submit">Save Changes</button>
    </form>
</section> 
<button onclick="window.location.href='#content-editor'">Edit Content</button>
