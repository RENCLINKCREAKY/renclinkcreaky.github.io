<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 1 - RENCLINKCREAKY — RENCLINKCREAKY</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--accent:#e8153a;--bg:#111;--nav-bg:#000;--surface:#1c1c1c;--surface2:#262626;--text:#f0f0f0;--muted:#777;--border:#2a2a2a;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
.topbar{background:var(--nav-bg);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
.back-btn:hover{color:var(--text);}
.chapter-title{font-size:14px;font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.view-toggle{display:flex;background:var(--surface);border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.view-btn{padding:5px 12px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;}
.view-btn.active{background:var(--surface2);color:var(--text);}
.fs-btn{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:13px;}
.fs-btn:hover{color:var(--text);}
.progress-bar{height:2px;background:var(--border);}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;}
.page-count{font-size:12px;color:var(--muted);white-space:nowrap;}
#scroll-view .pages{display:flex;flex-direction:column;align-items:center;}
#scroll-view .pages img{width:100%;max-width:800px;display:block;}
#page-view{display:none;}
#page-view .page-container{display:flex;justify-content:center;min-height:calc(100vh - 56px);cursor:pointer;}
#page-view .page-container img{width:100%;max-width:800px;display:block;}
.pnav{display:flex;max-width:800px;margin:0 auto;padding:16px 20px;gap:12px;}
.pnav-btn{flex:1;padding:11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;cursor:pointer;transition:background .2s;font-family:inherit;}
.pnav-btn:hover{background:var(--surface2);}
.pnav-btn:disabled{opacity:.25;cursor:default;}
.key-hint{text-align:center;font-size:11px;color:var(--muted);padding:0 0 12px;}
.key-hint span{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 6px;margin:0 2px;font-size:11px;}
.chapter-nav{max-width:800px;margin:0 auto;display:flex;padding:24px 20px 12px;gap:12px;}
.cnav-btn{flex:1;padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;text-align:center;transition:background .2s;text-decoration:none;display:block;}
.cnav-btn:hover{background:var(--surface2);}
.cnav-btn.disabled{opacity:.3;pointer-events:none;}
.cnav-btn small{display:block;font-size:11px;color:var(--muted);margin-top:2px;}
.divider{max-width:800px;margin:12px auto;border:none;border-top:1px solid var(--border);}
.reactions{max-width:800px;margin:0 auto;padding:20px 20px 0;display:flex;align-items:center;gap:12px;}
.like-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:14px;color:var(--muted);transition:all .2s;font-family:inherit;}
.like-btn:hover{border-color:var(--accent);color:var(--accent);}
.like-btn.liked{background:rgba(232,21,58,.1);border-color:var(--accent);color:var(--accent);}
.rss-link{font-size:12px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:5px;margin-left:auto;}
.rss-link:hover{color:#f90;}
.comments-wrap{max-width:800px;margin:0 auto;padding:28px 20px 60px;}
.comments-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.comments-note{font-size:13px;color:var(--muted);line-height:1.7;background:var(--surface);border-radius:8px;padding:14px 16px;margin-bottom:20px;}
.end-card{text-align:center;padding:36px 20px 28px;color:var(--muted);font-size:14px;}
.end-line{display:flex;align-items:center;gap:12px;justify-content:center;}
.end-line::before,.end-line::after{content:'';flex:1;max-width:80px;height:1px;background:var(--border);}
@media(max-width:600px){.chapter-title,.key-hint{display:none;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="https://renclinkcreaky.github.io/archive/index.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Archive
    </a>
    <span class="chapter-title">Chapter 1 - RENCLINKCREAKY</span>
  </div>
  <div class="topbar-right">
    <span class="page-count" id="pc"></span>
    <div class="view-toggle">
      <button class="view-btn active" id="bs" onclick="sv('scroll')">Scroll</button>
      <button class="view-btn" id="bp" onclick="sv('page')">Page</button>
    </div>
    <button class="fs-btn" onclick="toggleFS()">&#x26F6;</button>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="pf" style="width:0%"></div></div>
<div id="scroll-view"><div class="pages">
    <img src="../images/ch1_01.png" alt="Chapter 1 - RENCLINKCREAKY Page 1">
    <img src="../images/ch1_02.png" alt="Chapter 1 - RENCLINKCREAKY Page 2">
</div></div>
<div id="page-view">
  <div class="page-container" id="pgc" onclick="np()"><img id="pgi" src="" alt=""></div>
  <div class="pnav"><button class="pnav-btn" id="pprev" onclick="event.stopPropagation();pp()">&#8592; Prev</button><button class="pnav-btn" id="pnext" onclick="event.stopPropagation();np()">Next &#8594;</button></div>
  <div class="key-hint">Use <span>&#8592;</span><span>&#8594;</span> arrow keys or click image</div>
</div>
<div class="chapter-nav">
  <a class="cnav-btn disabled" href="#">&#8592; Previous<small>No previous chapter</small></a>

</div>
<div class="end-card"><div class="end-line">End of Chapter 1 - RENCLINKCREAKY</div></div>
<div class="chapter-nav">
  <a class="cnav-btn disabled" href="#">&#8592; Previous<small>No previous chapter</small></a>
  <a class="cnav-btn " href="https://renclinkcreaky.github.io/comic/chapter2.html">Next &#8594;<small>Chapter 2</small></a>
</div>
<hr class="divider">
<div class="reactions">
  <button class="like-btn" id="lb" onclick="tl()"><span id="li">&#9825;</span><span id="lc">Like this chapter</span></button>
  <a class="rss-link" href="https://renclinkcreaky.github.io/rss.xml" target="_blank"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><circle cx="6" cy="18" r="2"/><path d="M4 4a16 16 0 0116 16M4 11a9 9 0 019 9"/></svg>Subscribe via RSS</a>
</div>
<div class="comments-wrap">
  <div class="comments-title">Comments</div>
  <div class="comments-note">Comments need a free GitHub account. No account? Reach out on social media!</div>
  <script src="https://utteranc.es/client.js" repo="RENCLINKCREAKY/renclinkcreaky.github.io" issue-term="pathname" theme="github-dark" crossorigin="anonymous" async></script>
</div>
<script>
const P=["../images/ch1_01.png",
    "../images/ch1_02.png"];
const K="lk_ch1";
let cp=0,vm="scroll";
function sv(m){vm=m;document.getElementById("scroll-view").style.display=m==="scroll"?"block":"none";document.getElementById("page-view").style.display=m==="page"?"block":"none";document.getElementById("bs").classList.toggle("active",m==="scroll");document.getElementById("bp").classList.toggle("active",m==="page");if(m==="page"){cp=0;sp(0);}up();}
function sp(i){cp=Math.max(0,Math.min(P.length-1,i));document.getElementById("pgi").src=P[cp];document.getElementById("pprev").disabled=cp===0;document.getElementById("pnext").disabled=cp===P.length-1;document.getElementById("pc").textContent=(cp+1)+" / "+P.length;window.scrollTo(0,0);up();}
function np(){if(cp<P.length-1)sp(cp+1);}function pp(){if(cp>0)sp(cp-1);}
document.addEventListener("keydown",function(e){if(vm!=="page")return;if(e.key==="ArrowRight"||e.key==="ArrowLeft"||e.key==="ArrowDown"||e.key==="ArrowUp")e.preventDefault();if(e.key==="ArrowRight"||e.key==="ArrowDown")np();else if(e.key==="ArrowLeft"||e.key==="ArrowUp")pp();});
let tx=0;document.addEventListener("touchstart",e=>{tx=e.touches[0].clientX;});document.addEventListener("touchend",e=>{if(vm!=="page")return;const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50){d>0?np():pp();}});
function up(){if(vm==="scroll"){const p=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;document.getElementById("pf").style.width=Math.min(p,100)+"%";document.getElementById("pc").textContent=Math.ceil((p/100)*P.length)+" / "+P.length;}else{document.getElementById("pf").style.width=((cp+1)/P.length*100)+"%";}}
window.addEventListener("scroll",up);up();
function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
function tl(){const l=localStorage.getItem(K)==="1";if(l){localStorage.removeItem(K);document.getElementById("lb").classList.remove("liked");document.getElementById("li").textContent="\u2665\u0338";document.getElementById("lc").textContent="Like this chapter";}else{localStorage.setItem(K,"1");document.getElementById("lb").classList.add("liked");document.getElementById("li").textContent="\u2665";document.getElementById("lc").textContent="Liked!";}}
if(localStorage.getItem(K)==="1"){document.getElementById("lb").classList.add("liked");document.getElementById("li").textContent="\u2665";document.getElementById("lc").textContent="Liked!";}
document.getElementById("pc").textContent="1 / "+P.length;
</script>
